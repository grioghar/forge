<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15122B"/>
      <stop offset="1" stop-color="#0B0D15"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- diamond outline, matching the sigil family mark -->
  <polygon points="512,180 844,512 512,844 180,512"
           fill="none" stroke="#8B7BF0" stroke-width="46" stroke-linejoin="round"/>
  <!-- cartridge glyph: Forge is the gaming member of the family -->
  <rect x="422" y="422" width="180" height="180" rx="28" fill="#ECEDF6"/>
  <rect x="422" y="422" width="180" height="54" rx="18" fill="#A99BF5"/>
</svg>
